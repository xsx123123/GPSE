software:
  version: "0.0.1"
  app_name: gpse
  author: "XIAOLIU, JZHANG"
  email: "1468835852@qq.com, zhangjian199567@outlook.com"
  url: https://github.com/xsx123123/GPSE
  description: "Genomic Prediction with Stacking Ensemble for horticultural crops"

external_tools:
  - name: plink
    cmd: plink
    version_flag: --version
    min_version: "1.9"
    required: true
    description: "PLINK 1.9 for genomic data format conversion and SNP extraction"
  - name: java
    cmd: java
    version_flag: -version
    required: false
    description: "Java runtime for optional Beagle imputation"
